services:
  # FinSentiment Training (Qwen Fine-tuning)
  finsentiment-train:
    build:
      context: .
      dockerfile: Dockerfile
    image: openmedallion:latest
    container_name: openmedallion-finsentiment
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN=${HF_TOKEN}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - ./openmedallion:/workspace/openmedallion
      - ./data:/workspace/data
      - ./trained_models:/workspace/trained_models
      - hf-cache:/root/.cache/huggingface
    working_dir: /workspace
    command: >
      bash -c "
      echo 'Preparing sentiment dataset...' &&
      python openmedallion/finsentiment/prepare_sentiment_data.py &&
      echo 'Starting Qwen fine-tuning...' &&
      python openmedallion/finsentiment/fine_tune_qwen.py --model_name Qwen/Qwen2.5-7B-Instruct --num_epochs 3 --batch_size 4 --learning_rate 2e-4 --max_seq_length 512 --output_dir ./trained_models/finsentiment/qwen_financial_sentiment &&
      echo 'Training complete. Pushing to Hub...' &&
      python -c 'from openmedallion.hub import push_to_hub, setup_token; setup_token(); push_to_hub(\"./trained_models/finsentiment/qwen_financial_sentiment\", \"${HF_USERNAME:-openmedallion}/qwen-financial-sentiment\", model_type=\"finsentiment\")'
      "
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - finsentiment
      - all

  # FinTS Training (LGBM Time-Series Forecasting)
  fints-train:
    build:
      context: .
      dockerfile: Dockerfile
    image: openmedallion:latest
    container_name: openmedallion-fints
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN=${HF_TOKEN}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
    volumes:
      - ./openmedallion:/workspace/openmedallion
      - ./data:/workspace/data
      - ./trained_models:/workspace/trained_models
    working_dir: /workspace
    command: >
      bash -c "
      echo 'Training LGBM models for all asset classes...' &&
      for asset in commodities crypto equities forex; do
        echo \"Training $asset...\" &&
        python openmedallion/fints/scripts/train_lgbm.py --asset_class $asset --output_dir ./trained_models/fints/$asset &&
        echo \"Pushing $asset model to Hub...\" &&
        python -c \"from openmedallion.hub import push_to_hub, setup_token; setup_token(); push_to_hub('./trained_models/fints/$asset', '${HF_USERNAME:-openmedallion}/fints-lgbm-$asset', model_type='fints', asset_class='$asset')\"
      done &&
      echo 'All FinTS models trained and pushed to Hub.'
      "
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - fints
      - all

  # Development Environment (Interactive)
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: openmedallion:latest
    container_name: openmedallion-dev
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN=${HF_TOKEN}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - ./openmedallion:/workspace/openmedallion
      - ./data:/workspace/data
      - ./trained_models:/workspace/trained_models
      - hf-cache:/root/.cache/huggingface
      - ./notebooks:/workspace/notebooks
    working_dir: /workspace
    command: bash
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - dev

  # Jupyter Notebook Server (for experimentation)
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    image: openmedallion:latest
    container_name: openmedallion-jupyter
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN=${HF_TOKEN}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - JUPYTER_ENABLE_LAB=yes
    volumes:
      - ./openmedallion:/workspace/openmedallion
      - ./data:/workspace/data
      - ./trained_models:/workspace/trained_models
      - hf-cache:/root/.cache/huggingface
      - ./notebooks:/workspace/notebooks
    working_dir: /workspace
    ports:
      - "8888:8888"
    command: >
      bash -c "
      pip install jupyterlab ipywidgets &&
      jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''
      "
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - jupyter

volumes:
  hf-cache:
    driver: local
