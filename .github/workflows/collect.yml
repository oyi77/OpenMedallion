name: Daily Data Collection

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install pandas numpy requests yfinance huggingface_hub pyarrow fastparquet
          
      - name: Run all collectors
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        run: |
          python3 run_all_collectors.py
          
      - name: Count files
        run: |
          echo "Total parquet files: $(find data/ -name '*.parquet' | wc -l)"
          find data/ -name '*.parquet' | sed 's|data/||' | cut -d/ -f1 | sort | uniq -c | sort -rn
          
      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          from pathlib import Path
          from huggingface_hub import HfApi, login
          
          login(token=os.environ['HF_TOKEN'])
          api = HfApi()
          
          data_dir = Path("data")
          repo_id = "oyi77/OpenMedallion"
          
          print("Uploading to HuggingFace...")
          api.upload_folder(
              folder_path=str(data_dir),
              repo_id=repo_id,
              repo_type="dataset",
              path_in_repo="data",
              commit_message=f"Daily update {os.environ.get('GITHUB_RUN_ID', 'manual')}"
          )
          print("Upload complete")
          EOF
